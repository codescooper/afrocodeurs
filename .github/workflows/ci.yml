name: CI

# Filet qualité automatique : sur chaque push (main/master) et chaque Pull Request.
# Dogfoode le runner du projet (./run) et valide aussi les migrations Prisma.
on:
  push:
    branches: [main, master]
  pull_request:

# Annule les exécutions superflues sur une même branche / PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    # Base Postgres éphémère : sert à valider les migrations (et, plus tard, les tests).
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: afrocodeurs
          POSTGRES_PASSWORD: afrocodeurs
          POSTGRES_DB: afrocodeurs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Valeurs de CI uniquement — jamais de secret réel ici (utiliser GitHub Secrets pour le déploiement).
      DATABASE_URL: postgresql://afrocodeurs:afrocodeurs@localhost:5432/afrocodeurs?schema=public
      AUTH_SECRET: ci-placeholder-secret-non-utilise-en-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: ./run lint

      - name: Build
        run: ./run build
